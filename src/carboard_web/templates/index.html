<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title | default("Carboard") }}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header>
      <strong>Carboard</strong>
      <span class="meta">{{ model_name | default("Raspberry Pi 4 Model B") }}</span>
      <div class="actions">
        <span id="camera-health" class="badge">Probing</span>
        <button type="button" id="toggle-camera">Disable Camera</button>
        <button type="button" id="refresh-camera">Refresh Feed</button>
        <button type="button" id="refresh-pins">Refresh Pins</button>
        <button type="button" id="restart-pi" class="danger">Restart Pi</button>
      </div>
      <div id="status-toast" class="toast" aria-live="polite"></div>
    </header>

    <main>
      <section class="panel pins-panel">
        <h2>Pins</h2>
        <div class="header-grid" id="header-grid"></div>
        <div class="legend">
          <span><span class="dot" style="background:var(--ok)"></span> Active</span>
          <span><span class="dot" style="background:var(--muted)"></span> Idle</span>
          <span><span class="dot" style="background:var(--accent-power)"></span> Power</span>
          <span><span class="dot" style="background:var(--accent-gnd)"></span> Ground</span>
          <span><span class="dot" style="background:var(--accent-i2c)"></span> I2C</span>
          <span><span class="dot" style="background:var(--accent-uart)"></span> UART</span>
          <span><span class="dot" style="background:var(--accent-spi)"></span> SPI</span>
          <span><span class="dot" style="background:var(--accent-pwm)"></span> PWM</span>
        </div>
      </section>

      <div class="sidebar">
        <section class="panel" aria-label="Camera feed">
          <h2>Camera</h2>
          <div class="camera-stage" id="camera-panel">
            <img
              id="camera-stream"
              class="camera-stream"
              data-stream-url="/stream.mjpg"
              alt="Camera feed"
            />
            <div class="camera-overlay" id="camera-overlay">
              <p>Waiting for camera stream</p>
            </div>
            <button type="button" id="fullscreen-camera" class="fullscreen-btn" title="Fullscreen">&#x26F6;</button>
          </div>
          <div class="camera-footer">
            <span id="camera-status-label" class="badge">Checking</span>
            <span id="camera-mode-label" class="meta">Live feed armed</span>
          </div>
        </section>

        <section class="panel" aria-label="Pin controls">
          <h2>Controls</h2>
          <div id="detail-placeholder">
            <p class="muted">Select a pin to view details.</p>
          </div>

          <div id="pin-detail" hidden>
            <h3 id="detail-name"></h3>
            <div class="pin-nums">
              <span>BCM <strong id="detail-bcm"></strong></span>
              <span>Physical <strong id="detail-phys"></strong></span>
            </div>
            <span class="badge" id="detail-badge"></span>
            <p class="muted" id="detail-note"></p>
            <p id="detail-state"></p>
            <button type="button" id="detail-toggle"></button>

            <div id="pwm-controls" hidden>
              <h4>PWM</h4>
              <label>
                Duty Cycle
                <div class="slider-row">
                  <input type="range" id="pwm-duty" min="0" max="100" value="50" step="1" />
                  <span id="pwm-duty-val">50%</span>
                </div>
              </label>
              <label>
                Frequency (Hz)
                <input type="number" id="pwm-freq" min="1" max="50000" value="1000" step="1" />
              </label>
              <button type="button" id="pwm-apply">Apply PWM</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      window.CARBOARD_BOOTSTRAP = {
        model: {{ model_name | default("Raspberry Pi 4 Model B") | tojson }},
        pins: {{ pins | default([]) | tojson }},
      };
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
