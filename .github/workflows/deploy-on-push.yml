name: Deploy on Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - carboard

    steps:
      - name: Deploy locally
        env:
          DEPLOY_PATH: /home/carboard/carboard
        run: |
          set -e
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"
          if [ ! -d .git ]; then
            git clone "https://github.com/${GITHUB_REPOSITORY}.git" .
          fi
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout "${GITHUB_REF_NAME}"
          git pull --ff-only origin "${GITHUB_REF_NAME}"
          bash scripts/install_webapp.sh
